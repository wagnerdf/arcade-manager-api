# ======================
# Configuração do Spring
# ======================
spring.application.name=arcade-manager-api
server.port=8080

# ======================
# MongoDB
# ======================
spring.data.mongodb.uri=mongodb://localhost:27017/arcade-manager
spring.data.mongodb.database=arcade-manager

# ======================
# Jackson (JSON)
# ======================
# Configuração correta de serialização de datas
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.default-property-inclusion=non_null

# ======================
# Logging
# ======================
logging.level.org.springframework=INFO
logging.level.com.wagnerdf.arcademanager=DEBUG

# ======================
# Spring Security
# ======================
# Senha gerada automaticamente para desenvolvimento
# Você pode criar usuários no banco depois
spring.security.user.name=admin
spring.security.user.password=admin123